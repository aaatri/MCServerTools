appId: com.mcservertools.app
productName: MinecraftServerTools
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - package.json
win:
  target:
    - target: portable
      arch:
        - x64
        - arm64
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
linux:
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
