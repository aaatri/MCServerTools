appId: com.mcservertools.app
productName: MinecraftServerTools
directories:
  output: release
files:
  - dist/main/**/*
  - dist/renderer/**/*
  - package.json
  - "!dist/**/*.map"
icon: public/icons/app-icon.png
win:
  target: nsis
mac:
  target: dmg
linux:
  target: AppImage
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
