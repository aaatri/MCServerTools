name: Build

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            suffix: Windows-x64
          - os: windows-latest
            arch: arm64
            suffix: Windows-arm64
          - os: macos-latest
            arch: x64
            suffix: macOS-x64
          - os: macos-latest
            arch: arm64
            suffix: macOS-arm64
          - os: ubuntu-latest
            arch: x64
            suffix: Linux-x64
          - os: ubuntu-latest
            arch: arm64
            suffix: Linux-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-xcb1 libxtst6 libxrandr2 libasound2t64 libnss3 libgtk-3-0 xvfb

      - run: npm ci

      - run: npm run build

      - name: Build app
        run: npx electron-builder --${{ runner.os == 'macOS' && 'mac' || runner.os == 'Windows' && 'win' || 'linux' }} --${{ matrix.arch }} --dir
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release/dist | Out-Null
          $dir = Get-ChildItem release -Directory | Where-Object { $_.Name -ne 'dist' -and -not $_.Name.StartsWith('.') } | Select-Object -First 1
          Write-Host "App dir: $($dir.FullName)"
          if (-not $dir) { Write-Host "No app dir found"; exit 1 }
          Compress-Archive -Path "$($dir.FullName)/*" -DestinationPath "release/dist/MCServerTools-${{ matrix.suffix }}.zip" -Force
          if ('${{ matrix.os }}' -eq 'windows-latest') {
            Copy-Item "$($dir.FullName)/MinecraftServerTools.exe" "release/dist/MCServerTools-${{ matrix.suffix }}.exe"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: MCServerTools-${{ matrix.suffix }}
          path: release/dist/MCServerTools-${{ matrix.suffix }}*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
