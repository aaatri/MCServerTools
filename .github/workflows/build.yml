name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            suffix: Windows-x64
            target: win
          - os: windows-latest
            arch: arm64
            suffix: Windows-arm64
            target: win
          - os: macos-latest
            arch: x64
            suffix: macOS-x64
            target: mac
          - os: macos-latest
            arch: arm64
            suffix: macOS-arm64
            target: mac
          - os: ubuntu-latest
            arch: x64
            suffix: Linux-x64
            target: linux
          - os: ubuntu-latest
            arch: arm64
            suffix: Linux-arm64
            target: linux

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-xcb1 libxtst6 libxrandr2 \
            libasound2 libnss3 libgtk-3-0 libxkbcommon0 libdrm2 \
            libgbm1 libxfixes3 libxcomposite1 libxcursor1 libxdamage1 \
            at-spi2-core

      - name: Install xvfb (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y xvfb

      - run: npm ci

      - run: npm run build

      - name: Build (${{ matrix.suffix }})
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run --auto-servernum npx electron-builder --${{ matrix.target }} --${{ matrix.arch }} --dir
          else
            npx electron-builder --${{ matrix.target }} --${{ matrix.arch }} --dir
          fi
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          ELECTRON_RUN_AS_NODE: 1

      - name: Package
        shell: bash
        run: |
          ARCH=${{ matrix.arch }}
          SUFFIX=${{ matrix.suffix }}
          OS=${{ matrix.os }}
          mkdir -p release/dist

          if [ "$OS" = "windows-latest" ]; then
            cd release/win-${ARCH}-unpacked
            7z a -tzip "../dist/MCServerTools-${SUFFIX}.zip" .
            cd ../..
            cp "release/win-${ARCH}-unpacked/MinecraftServerTools.exe" "release/dist/MCServerTools-${SUFFIX}.exe" || true
          elif [ "$OS" = "macos-latest" ]; then
            cd release
            zip -r "dist/MCServerTools-${SUFFIX}.zip" "mac-${ARCH}-unpacked/"
            cd ..
          else
            cd release
            zip -r "dist/MCServerTools-${SUFFIX}.zip" "linux-${ARCH}-unpacked/"
            cd ..
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: MCServerTools-${{ matrix.suffix }}
          path: release/dist/MCServerTools-${{ matrix.suffix }}*
