name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: x64
            suffix: Windows-x64
          - os: windows-latest
            arch: arm64
            suffix: Windows-arm64
          - os: macos-latest
            arch: x64
            suffix: macOS-x64
          - os: macos-latest
            arch: arm64
            suffix: macOS-arm64
          - os: ubuntu-latest
            arch: x64
            suffix: Linux-x64
          - os: ubuntu-latest
            arch: arm64
            suffix: Linux-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build

      - name: Build
        run: npx electron-builder --${{ matrix.os == 'macos-latest' && 'mac' || matrix.os == 'ubuntu-latest' && 'linux' || 'win' }} --${{ matrix.arch }} --dir
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Package
        shell: bash
        run: |
          ARCH=${{ matrix.arch }}
          SUFFIX=${{ matrix.suffix }}
          OS=${{ matrix.os }}
          mkdir -p release/dist

          if [ "$OS" = "windows-latest" ]; then
            # zip the whole unpacked folder
            cd release/win-${ARCH}-unpacked
            7z a -tzip "../dist/MCServerTools-${SUFFIX}.zip" .
            cd ../..
            # also copy the exe
            cp "release/win-${ARCH}-unpacked/MinecraftServerTools.exe" "release/dist/MCServerTools-${SUFFIX}.exe" || true
          elif [ "$OS" = "macos-latest" ]; then
            cd release
            zip -r "dist/MCServerTools-${SUFFIX}.zip" "mac-${ARCH}-unpacked/"
            cd ..
          else
            cd release
            zip -r "dist/MCServerTools-${SUFFIX}.zip" "linux-${ARCH}-unpacked/"
            cd ..
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: MCServerTools-${{ matrix.suffix }}
          path: release/dist/MCServerTools-${{ matrix.suffix }}*
