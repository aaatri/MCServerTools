name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            suffix: Windows-x64
            target: win
          - os: windows-latest
            arch: arm64
            suffix: Windows-arm64
            target: win
          - os: macos-latest
            arch: x64
            suffix: macOS-x64
            target: mac
          - os: macos-latest
            arch: arm64
            suffix: macOS-arm64
            target: mac
          - os: ubuntu-latest
            arch: x64
            suffix: Linux-x64
            target: linux
          - os: ubuntu-latest
            arch: arm64
            suffix: Linux-arm64
            target: linux

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -o Acquire::AllowInsecureRepositories=true 2>/dev/null || true
          sudo apt-get install -y libx11-xcb1 libxtst6 libxrandr2 libasound2t64 libnss3 libgtk-3-0 xvfb

      - run: npm ci
      - run: npm run build

      - name: Build installer
        run: npx electron-builder --${{ matrix.target }} --${{ matrix.arch }} --publish=never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build portable zip
        run: npx electron-builder --${{ matrix.target }} --${{ matrix.arch }} --dir --publish=never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Package artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release/dist | Out-Null

          # Copy installer
          Get-ChildItem release -File | Where-Object {
            $_.Extension -in '.exe','.dmg','.AppImage'
          } | ForEach-Object {
            $newname = "MCServerTools-${{ matrix.suffix }}$($_.Extension)"
            Copy-Item $_.FullName "release/dist/$newname"
          }

          # Zip the unpacked dir
          $appdir = Get-ChildItem release -Directory | Where-Object {
            -not $_.Name.StartsWith('.') -and $_.Name -ne 'dist'
          } | Select-Object -First 1
          if ($appdir) {
            Compress-Archive -Path "$($appdir.FullName)/*" -DestinationPath "release/dist/MCServerTools-${{ matrix.suffix }}.zip" -Force
          }

      - uses: actions/upload-artifact@v4
        with:
          name: MCServerTools-${{ matrix.suffix }}
          path: release/dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
