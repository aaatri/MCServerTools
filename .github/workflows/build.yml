name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            suffix: Windows-x64
            target: win
          - os: windows-latest
            arch: arm64
            suffix: Windows-arm64
            target: win
          - os: macos-latest
            arch: x64
            suffix: macOS-x64
            target: mac
          - os: macos-latest
            arch: arm64
            suffix: macOS-arm64
            target: mac
          - os: ubuntu-latest
            arch: x64
            suffix: Linux-x64
            target: linux
          - os: ubuntu-latest
            arch: arm64
            suffix: Linux-arm64
            target: linux

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-xcb1 libxtst6 libxrandr2 \
            libasound2t64 libnss3 libgtk-3-0 libxkbcommon0 libdrm2 \
            libgbm1 libxfixes3 libxcomposite1 libxcursor1 libxdamage1 \
            at-spi2-core xvfb

      - run: npm ci

      - run: npm run build

      - name: Build
        run: npx electron-builder --${{ matrix.target }} --${{ matrix.arch }} --dir
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        shell: bash

      - name: Package
        shell: bash
        run: |
          ARCH=${{ matrix.arch }}
          SUFFIX=${{ matrix.suffix }}
          OS=${{ matrix.os }}
          mkdir -p release/dist

          if [ "$OS" = "windows-latest" ]; then
            # Windows: electron-builder outputs to release/win-ARCH-unpacked/
            cd "release/win-${ARCH}-unpacked"
            zip -r "../dist/MCServerTools-${SUFFIX}.zip" .
            cd ../..
            cp "release/win-${ARCH}-unpacked/MinecraftServerTools.exe" "release/dist/MCServerTools-${SUFFIX}.exe" || true
          elif [ "$OS" = "macos-latest" ]; then
            # macOS: electron-builder outputs to release/mac/
            cd "release/mac"
            zip -r "../dist/MCServerTools-${SUFFIX}.zip" .
            cd ../..
          else
            # Linux: electron-builder outputs to release/linux-ARCH-unpacked/
            cd "release/linux-${ARCH}-unpacked"
            zip -r "../dist/MCServerTools-${SUFFIX}.zip" .
            cd ../..
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: MCServerTools-${{ matrix.suffix }}
          path: release/dist/MCServerTools-${{ matrix.suffix }}*
