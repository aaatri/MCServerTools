name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: x64
            suffix: Windows-x64
          - os: windows-latest
            arch: arm64
            suffix: Windows-arm64
          - os: macos-latest
            arch: x64
            suffix: macOS-x64
          - os: macos-latest
            arch: arm64
            suffix: macOS-arm64
          - os: ubuntu-latest
            arch: x64
            suffix: Linux-x64
          - os: ubuntu-latest
            arch: arm64
            suffix: Linux-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build

      - name: Build (${{ matrix.suffix }})
        run: npx electron-builder --${{ matrix.os == 'macos-latest' && 'mac' || matrix.os == 'ubuntu-latest' && 'linux' || 'win' }} --${{ matrix.arch }} --dir
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Rename executable
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            ext=".exe"
            dir="release/win-${arch}-unpacked"
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            ext=".app"
            dir="release/mac-${arch}-unpacked"
          else
            ext=""
            dir="release/linux-${arch}-unpacked"
          fi
          mkdir -p release/dist
          cd "release/${dir}" || exit 1
          # Find the executable/AppImage and copy with new name
          find . -maxdepth 1 -type f -name "*${{ matrix.os != 'macos-latest' && 'MinecraftServerTools*' || '' }}" -exec cp {} "../dist/MCServerTools-${{ matrix.suffix }}$ext" \;

      - uses: actions/upload-artifact@v4
        with:
          name: MCServerTools-${{ matrix.suffix }}
          path: release/dist/MCServerTools-${{ matrix.suffix }}*
