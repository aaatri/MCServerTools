name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            suffix: Windows-x64
            target: win
          - os: windows-latest
            arch: arm64
            suffix: Windows-arm64
            target: win
          - os: macos-latest
            arch: x64
            suffix: macOS-x64
            target: mac
          - os: macos-latest
            arch: arm64
            suffix: macOS-arm64
            target: mac
          - os: ubuntu-latest
            arch: x64
            suffix: Linux-x64
            target: linux
          - os: ubuntu-latest
            arch: arm64
            suffix: Linux-arm64
            target: linux

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -o Acquire::AllowInsecureRepositories=true 2>/dev/null || true
          sudo apt-get install -y libx11-xcb1 libxtst6 libxrandr2 libasound2t64 libnss3 libgtk-3-0 xvfb

      - run: npm ci
      - run: npm run build

      - name: Build installer
        run: npx electron-builder --${{ matrix.target }} --${{ matrix.arch }} --publish=never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build portable zip
        run: npx electron-builder --${{ matrix.target }} --${{ matrix.arch }} --dir --publish=never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Package artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release/dist | Out-Null

          # Copy installer
          Get-ChildItem release -File | Where-Object {
            $_.Extension -in '.exe','.dmg','.AppImage'
          } | ForEach-Object {
            $newname = "MCServerTools-${{ matrix.suffix }}$($_.Extension)"
            Copy-Item $_.FullName "release/dist/$newname"
          }

          # Zip the unpacked dir
          $appdir = Get-ChildItem release -Directory | Where-Object {
            -not $_.Name.StartsWith('.') -and $_.Name -ne 'dist'
          } | Select-Object -First 1
          if ($appdir) {
            Compress-Archive -Path "$($appdir.FullName)/*" -DestinationPath "release/dist/MCServerTools-${{ matrix.suffix }}.zip" -Force
          }

      - uses: actions/upload-artifact@v4
        with:
          name: MCServerTools-${{ matrix.suffix }}
          path: release/dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          body: |
            MCServerTools 首个正式版发布 🎉

            ### 服务器核心管理
            支持 10 种服务端核心**一键下载与部署**：
            - **原版** Vanilla
            - **Bukkit 系列** Paper、Purpur、CraftBukkit、Spigot
            - **Mod 加载器** Forge、Fabric、NeoForge、Sponge
            - **混合核心** Mohist

            下载时实时显示**进度条**、**下载速度**和**文件名**，下载完成后自动保存到服务器列表。

            ### 服务器管理
            - **多服务器管理** — 支持添加多台服务器，下拉切换，自定义名称
            - **启动/停止** — 一键启停，支持内存分配（512MB - 16GB）
            - **日志查看** — 实时日志输出，支持滚动查看
            - **控制台命令** — 输入 Minecraft 指令（/op、/gamemode 等）
            - **强制停止** — 进程无响应时可强制终止
            - **Java 自动检测** — 自动识别系统 Java 环境

            ### 配置编辑器
            - **图形化 server.properties 编辑器** — 35+ 项配置中文标注
            - 支持开关（正版验证、PVP、白名单等）
            - 下拉选择（难度、游戏模式等）
            - 数字/文本输入（端口、视距、种子等）
            - 无需手动编辑配置文件

            ### FRP 内网穿透
            - **内置 frpc 客户端** — 首次启动自动下载
            - 支持 frp 服务器地址、端口、Token 配置
            - 本地端口/远程端口自定义
            - 连接状态实时显示 + 日志输出

            ### 界面
            - **Material Design** 设计风格
            - **浅色/深色主题**一键切换
            - 侧边栏导航，页面切换不丢失状态
            - 关于页面（版本信息、GitHub 链接）

            ### 跨平台支持
            - **Windows** AMD64 / ARM64（NSIS 安装包 + 便携版）
            - **macOS** Intel / Apple Silicon（DMG 安装包 + 便携版）
            - **Linux** AMD64 / ARM64（AppImage + 便携版）

            ### 下载说明
            每个平台提供两种格式：
            - **安装包**（`.exe` / `.dmg` / `.AppImage`）— 直接安装运行
            - **便携包**（`.zip`）— 解压即用，无需安装

            ### v1.0.1 更新内容
            - 修复 macOS 启动服务端时的路径拼接错误
            - 修复下载服务器后"服务器管理"页面不自动刷新
            - 修复首次启动服务器不会自动同意 EULA
            - 补充跨平台 server.properties 路径处理
            - 修正前端类型声明和只读输入框写法

            ---
            制作者：小亚 | [GitHub](https://github.com/aaatri/MCServerTools)
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
